<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalentDNA PRO MAX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}

body{
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

.sidebar{
width:240px;
background:#020617;
padding:20px;
}

.logo{
font-size:24px;
font-weight:bold;
color:#38bdf8;
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
cursor:pointer;
}

.main{
flex:1;
padding:25px;
}

.page{display:none;}
.active{display:block;}

.card{
background:#1e293b;
padding:20px;
border-radius:14px;
margin-bottom:18px;
}

.big{
font-size:26px;
margin-bottom:10px;
}

input,select{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin:8px 0;
}

.action{
background:#38bdf8;
color:black;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
font-weight:bold;
}

#login{
position:fixed;
inset:0;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:300px;
}
</style>
</head>

<body>

<div id="login">
<div class="login-box">
<div class="big">🧬 TalentDNA</div>
<input id="nome" placeholder="Seu nome">
<button class="action" onclick="entrar()">Entrar</button>
</div>
</div>

<div class="sidebar">
<div class="logo">TalentDNA</div>
<button onclick="abrir('inicio')">🏠 Início</button>
<button onclick="abrir('ifpb')">🎓 IFPB</button>
</div>

<div class="main">

<div id="inicio" class="page active">
<div class="card">
<div class="big">Bem-vindo</div>
<p id="textoBoasVindas">Seu painel.</p>
</div>
</div>

<div id="ifpb" class="page">
<div class="card">
<div class="big">Acesso IFPB</div>
<input id="nomeAluno" placeholder="Seu nome">
<select id="campusAluno">
<option value="">Selecione campus</option>
<option>IFPB Itaporanga</option>
<option>IFPB João Pessoa</option>
</select>

<button class="action" onclick="validarIFPB()">Entrar no SUAP</button>

<p id="resultadoIFPB"></p>
</div>
</div>

</div>

<script>
function entrar(){
let nome=document.getElementById("nome").value;
if(nome){
document.getElementById("login").style.display="none";
document.getElementById("textoBoasVindas").innerText="Bem-vindo "+nome;
}
}

function abrir(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function validarIFPB(){
let nome=document.getElementById("nomeAluno").value;
let campus=document.getElementById("campusAluno").value;

if(nome=="" || campus==""){
document.getElementById("resultadoIFPB").innerText="Preencha tudo!";
return;
}

document.getElementById("resultadoIFPB").innerText="Redirecionando...";

setTimeout(()=>{
window.open("https://suap.ifpb.edu.br/accounts/login/","_blank");
},1000);
}
</script>

</body>
</html>
