<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TalentFlow</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI';
    display:flex;
    background:#0f172a;
    color:#fff;
}

/* SIDEBAR */
.sidebar{
    width:230px;
    background:#020617;
    padding:20px;
}

.sidebar h2{
    margin-bottom:20px;
    color:#38bdf8;
}

.sidebar button{
    width:100%;
    margin:6px 0;
    padding:10px;
    border:none;
    background:#0f172a;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
}

.sidebar button:hover{
    background:#38bdf8;
    color:#000;
}

/* MAIN */
.main{
    flex:1;
    padding:25px;
}

.section{display:none;}
.active{display:block;}

/* CARDS */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

/* BOTÃO DELETE */
.delete-btn{
    background:#ef4444;
    border:none;
    padding:5px 10px;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin-top:5px;
}

/* INPUT */
input,select{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:5px;
}

button.action{
    background:#38bdf8;
    border:none;
    padding:10px;
    color:#000;
    border-radius:6px;
    cursor:pointer;
}

/* LOGIN */
#login{
    position:absolute;
    width:100%;
    height:100vh;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>TalentFlow</h2>
<input id="user" placeholder="Seu nome">
<button class="action" onclick="entrar()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%;">

<div class="sidebar">
<h2>🚀 TalentFlow</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('talentos')">Talentos</button>
<button onclick="show('detalhe')">Detalhes</button>
<button onclick="show('metas')">Metas</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Visão Geral</h2>
<div class="grid">
<div class="card">💡 Explore talentos</div>
<div class="card">📈 Acompanhe metas</div>
<div class="card">💰 Gere renda</div>
</div>
</div>

<!-- TALENTOS -->
<div id="talentos" class="section">
<h2>Escolha um talento</h2>
<div class="grid">
<div class="card" onclick="abrir('Desenho')">🎨 Desenho</div>
<div class="card" onclick="abrir('Video')">🎬 Vídeo</div>
<div class="card" onclick="abrir('Cozinha')">🍰 Cozinha</div>
<div class="card" onclick="abrir('Escrita')">✍️ Escrita</div>
</div>
</div>

<!-- DETALHE -->
<div id="detalhe" class="section">
<h2 id="titulo"></h2>
<p id="desc"></p>

<h3>💰 Estratégia:</h3>
<p id="ganho"></p>

<h3>⚡ Primeira ação:</h3>
<p id="acao"></p>
</div>

<!-- METAS -->
<div id="metas" class="section">
<h2>Planejamento</h2>

<input id="metaTexto" placeholder="Meta">
<input type="date" id="metaData">

<select id="metaMes">
<option>Janeiro</option>
<option>Fevereiro</option>
<option>Março</option>
<option>Abril</option>
<option>Maio</option>
<option>Junho</option>
<option>Julho</option>
<option>Agosto</option>
<option>Setembro</option>
<option>Outubro</option>
<option>Novembro</option>
<option>Dezembro</option>
</select>

<button class="action" onclick="salvar()">Salvar</button>

<h3>Metas</h3>
<div id="lista"></div>
</div>

</div>
</div>

<script>

// LOGIN
function entrar(){
if(user.value){
login.style.display="none";
app.style.display="flex";
}
}

// NAVEGAÇÃO
function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// TALENTOS
function abrir(nome){

let dados={
"Desenho":{
desc:"Criar artes visuais.",
ganho:"Venda artes online.",
acao:"Poste 3 artes hoje."
},
"Video":{
desc:"Editar vídeos.",
ganho:"Atenda criadores.",
acao:"Edite 1 vídeo simples."
},
"Cozinha":{
desc:"Produzir alimentos.",
ganho:"Venda doces.",
acao:"Faça 5 brigadeiros."
},
"Escrita":{
desc:"Criar textos.",
ganho:"Venda conteúdo.",
acao:"Escreva 1 post."
}
};

titulo.innerText=nome;
desc.innerText=dados[nome].desc;
ganho.innerText=dados[nome].ganho;
acao.innerText=dados[nome].acao;

show("detalhe");
}

// METAS
function salvar(){

let metas=JSON.parse(localStorage.getItem("metas"))||[];

metas.push({
texto:metaTexto.value,
data:metaData.value,
mes:metaMes.value
});

localStorage.setItem("metas",JSON.stringify(metas));

render();
}

// APAGAR META
function apagar(index){

let metas=JSON.parse(localStorage.getItem("metas"))||[];

metas.splice(index,1);

localStorage.setItem("metas",JSON.stringify(metas));

render();
}

// RENDER
function render(){
let metas=JSON.parse(localStorage.getItem("metas"))||[];
lista.innerHTML="";

metas.forEach((m,i)=>{
lista.innerHTML+=`
<div class="card">
<strong>${m.texto}</strong><br>
${m.data} - ${m.mes}<br>
<button class="delete-btn" onclick="apagar(${i})">🗑 Apagar</button>
</div>`;
});
}

render();

</script>

</body>
</html>
